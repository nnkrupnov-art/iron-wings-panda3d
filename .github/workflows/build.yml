name: Build Windows Executable

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          pip install panda3d pyinstaller
          
      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed --name IronWings --add-data "main.py;." --distpath ./release --workpath ./build --specpath . main.py
          
      - name: Create distribution package
        run: |
          New-Item -ItemType Directory -Force -Path release/package
          Copy-Item release/IronWings.exe release/package/
          Copy-Item main.py release/package/
          
          # Create launcher batch
          @"
          @echo off
          title Iron Wings - WWII Flight Simulator
          color 0A
          cls
          echo.
          echo ================================================
          echo    IRON WINGS - WWII Flight Simulator
          echo ================================================
          echo.
          echo Starting...
          echo.
          IronWings.exe
          pause
          "@ | Out-File -FilePath release/package/Launch-IronWings.bat -Encoding ASCII
          
          # Create README
          @"
          IRON WINGS - WWII Flight Simulator
          ================================
          
          Installation:
          1. Extract all files
          2. Double-click Launch-IronWings.bat
          
          Controls:
          W/S - Pitch up/down
          A/D - Roll left/right  
          Q/E - Yaw
          Shift/Ctrl - Throttle
          Space - Brake
          R - Reset
          ESC - Quit
          
          Requirements:
          - Windows 10+
          - OpenGL compatible graphics
          "@ | Out-File -FilePath release/package/README.txt -Encoding ASCII
          
          Compress-Archive -Path release/package/* -DestinationPath IronWings-v${{ github.ref_name }}-Win64.zip -Force
          
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: IronWings-*.zip
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: IronWings-Win64
          path: release/package/
          
      - name: Create Pre-release Package
        run: |
          if (!(Test-Path "pre-release")) { New-Item -ItemDirectory -Force -Path "pre-release" }
          Copy-Item release/package/* pre-release/
          Compress-Archive -Path pre-release/* -DestinationPath IronWings-PreRelease-Win64.zip -Force
        shell: powershell
